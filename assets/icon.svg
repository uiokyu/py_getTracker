<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f0d"/>
      <stop offset="100%" stop-color="#0d1f17"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hoodGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1f24"/>
      <stop offset="100%" stop-color="#0f1216"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00e070"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="220" r="200" fill="url(#glow)"/>

  <!-- Matrix rain lines -->
  <g stroke="#0aa96e" stroke-width="2" stroke-opacity="0.4">
    <line x1="60" y1="40" x2="60" y2="140"/>
    <line x1="100" y1="20" x2="100" y2="200"/>
    <line x1="140" y1="60" x2="140" y2="220"/>
    <line x1="180" y1="30" x2="180" y2="210"/>
    <line x1="220" y1="50" x2="220" y2="190"/>
    <line x1="260" y1="10" x2="260" y2="180"/>
    <line x1="300" y1="40" x2="300" y2="200"/>
    <line x1="340" y1="25" x2="340" y2="210"/>
    <line x1="380" y1="55" x2="380" y2="220"/>
    <line x1="420" y1="15" x2="420" y2="190"/>
  </g>

  <!-- Stylized hooded figure -->
  <g>
    <path d="M256 110 C210 130 180 170 170 220 L160 330 C160 350 180 360 200 350 L240 330 C245 328 251 328 256 330 C261 328 267 328 272 330 L312 350 C332 360 352 350 352 330 L342 220 C332 170 302 130 256 110 Z" fill="url(#hoodGrad)" stroke="#00ff88" stroke-opacity="0.5" stroke-width="2"/>
    <circle cx="256" cy="230" r="38" fill="#0f1418" stroke="#00ff88" stroke-width="2" stroke-opacity="0.7"/>
    <!-- Eyes -->
    <ellipse cx="244" cy="233" rx="7" ry="5" fill="#00ff88"/>
    <ellipse cx="268" cy="233" rx="7" ry="5" fill="#00ff88"/>
  </g>

  <!-- Neon tracker badge -->
  <g transform="translate(156,352)">
    <rect x="0" y="0" width="200" height="90" rx="18" fill="#0b0f12" stroke="url(#neon)" stroke-width="3"/>
    <path d="M26 25 H54" stroke="#00ff88" stroke-width="4" stroke-linecap="round"/>
    <path d="M40 12 V38" stroke="#00ff88" stroke-width="4" stroke-linecap="round"/>
    <text x="80" y="55" font-family="Consolas, Menlo, monospace" font-size="34" fill="#00ff88">Tracker</text>
  </g>

  <!-- subtle border -->
  <rect x="6" y="6" width="500" height="500" rx="30" fill="none" stroke="#0aa96e" stroke-opacity="0.4" stroke-width="3"/>
</svg>